aid: mikmak
name: MikMak
description: >-
  MikMak provides eCommerce enablement and analytics software for multichannel
  brands to convert global customers across social media, retail media, brand
  websites, search, CTV, display, and QR codes. The platform combines
  commerce, analytics, and AI-powered insights to connect marketing spend to
  retail sales performance.
